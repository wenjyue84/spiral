name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: koalaman/shellcheck-action@v1
        with:
          version: v0.10.0
          severity: error
          format: gcc
          args: >-
            spiral.sh
            setup.sh
            spiral.config.sh
            lib/circuit_breaker.sh
            lib/memory-pressure-check.sh
            lib/run_parallel_ralph.sh
            lib/spiral_assert.sh
            lib/spiral_doctor.sh
            lib/validate_preflight.sh
            lib/worker_heartbeat.sh

  shfmt-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Check shell script formatting
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          shfmt -d -i 2 -ci \
            spiral.sh \
            setup.sh \
            spiral.config.sh \
            ralph/ralph.sh \
            lib/circuit_breaker.sh \
            lib/memory-pressure-check.sh \
            lib/memory-watchdog.sh \
            lib/run_parallel_ralph.sh \
            lib/spiral_assert.sh \
            lib/spiral_doctor.sh \
            lib/spiral_retry.sh \
            lib/validate_preflight.sh \
            lib/worker_heartbeat.sh

  mypy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy strict
        run: |
          set -o pipefail
          uv run mypy lib/ --strict --output json \
            | uv run python lib/mypy_to_github_annotations.py

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Restore Hypothesis database
        uses: actions/cache@v4
        with:
          path: .hypothesis
          key: ${{ runner.os }}-hypothesis-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hypothesis-

      - name: Install dependencies
        run: uv sync

      - name: Validate prd.json schema
        run: uv run python lib/prd_schema.py prd.json

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  bats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run bats tests with JUnit output
        run: |
          mkdir -p test-reports
          tests/bats-core/bin/bats \
            --formatter tap \
            --report-formatter junit \
            -o test-reports/ \
            tests/*.bats tests/lib/*.bats

      - name: Upload bats JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bats-junit-results
          path: test-reports/*.xml

      - name: Publish bats test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Bats Tests
          path: test-reports/*.xml
          reporter: java-junit
          fail-on-error: false
