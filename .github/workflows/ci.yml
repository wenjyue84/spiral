name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: koalaman/shellcheck-action@v1
        with:
          version: v0.10.0
          severity: error
          format: gcc
          args: >-
            spiral.sh
            setup.sh
            spiral.config.sh
            lib/circuit_breaker.sh
            lib/memory-pressure-check.sh
            lib/run_parallel_ralph.sh
            lib/spiral_assert.sh
            lib/spiral_doctor.sh
            lib/validate_preflight.sh
            lib/worker_heartbeat.sh

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Restore Hypothesis database
        uses: actions/cache@v4
        with:
          path: .hypothesis
          key: ${{ runner.os }}-hypothesis-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hypothesis-

      - name: Install dependencies
        run: uv sync

      - name: Validate prd.json schema
        run: uv run python lib/prd_schema.py prd.json

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
