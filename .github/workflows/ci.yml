name: CI

# SECURITY: pull_request_target with untrusted code checkout is FORBIDDEN.
# Never use pull_request_target alongside a checkout of the PR branch, as it
# grants write permissions to untrusted code. See:
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run ShellCheck
        run: |
          shellcheck --severity=error --format=gcc \
            spiral.sh \
            setup.sh \
            spiral.config.sh \
            lib/circuit_breaker.sh \
            lib/memory-pressure-check.sh \
            lib/run_parallel_ralph.sh \
            lib/spiral_assert.sh \
            lib/spiral_doctor.sh \
            lib/validate_preflight.sh \
            lib/worker_heartbeat.sh

  shfmt-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

      - name: Check shell script formatting
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          shfmt -d -i 2 -ci \
            spiral.sh \
            setup.sh \
            spiral.config.sh \
            ralph/ralph.sh \
            lib/circuit_breaker.sh \
            lib/memory-pressure-check.sh \
            lib/memory-watchdog.sh \
            lib/run_parallel_ralph.sh \
            lib/spiral_assert.sh \
            lib/spiral_doctor.sh \
            lib/spiral_retry.sh \
            lib/validate_preflight.sh \
            lib/worker_heartbeat.sh

  mypy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy strict
        run: |
          set -o pipefail
          uv run mypy lib/ --strict --output json \
            | uv run python lib/mypy_to_github_annotations.py

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Restore Hypothesis database
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .hypothesis
          key: ${{ runner.os }}-hypothesis-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-hypothesis-

      - name: Install dependencies
        run: uv sync

      - name: Validate prd.json schema
        run: uv run python lib/prd_schema.py prd.json

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=lib \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=48

      - name: Append coverage summary to step summary
        if: always()
        run: uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report-html
          path: htmlcov/
          retention-days: 7

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report-xml
          path: coverage.xml
          retention-days: 7

  sarif:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF to GitHub Code Scanning

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Cache shellcheck-sarif cargo binary
        id: cache-shellcheck-sarif
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cargo/bin/shellcheck-sarif
          key: ${{ runner.os }}-shellcheck-sarif-v1

      - name: Install shellcheck-sarif
        if: steps.cache-shellcheck-sarif.outputs.cache-hit != 'true'
        run: cargo install shellcheck-sarif --quiet

      - name: Run ShellCheck and convert to SARIF
        run: |
          shellcheck -f json \
            spiral.sh \
            setup.sh \
            spiral.config.sh \
            lib/circuit_breaker.sh \
            lib/memory-pressure-check.sh \
            lib/run_parallel_ralph.sh \
            lib/spiral_assert.sh \
            lib/spiral_doctor.sh \
            lib/validate_preflight.sh \
            lib/worker_heartbeat.sh \
          | shellcheck-sarif > shellcheck.sarif || true

      - name: Install semgrep
        run: python -m pip install semgrep --quiet

      - name: Run semgrep and output SARIF
        run: |
          semgrep --config=auto --sarif --output=semgrep.sarif . || \
            printf '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"semgrep","rules":[]}},"results":[]}]}\n' \
              > semgrep.sarif

      - name: Install check-jsonschema for SARIF validation
        run: python -m pip install check-jsonschema --quiet

      - name: Validate shellcheck SARIF schema
        run: check-jsonschema --schemafile https://json.schemastore.org/sarif-2.1.0.json shellcheck.sarif

      - name: Validate semgrep SARIF schema
        run: check-jsonschema --schemafile https://json.schemastore.org/sarif-2.1.0.json semgrep.sarif

      - name: Upload shellcheck SARIF to GitHub Code Scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3  # TODO: pin to SHA
        with:
          sarif_file: shellcheck.sarif
          category: shellcheck

      - name: Upload semgrep SARIF to GitHub Code Scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3  # TODO: pin to SHA
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload SARIF reports as artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sarif-reports
          path: |
            shellcheck.sarif
            semgrep.sarif
          retention-days: 7

  bats:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive

      - name: Run bats tests with JUnit output
        run: |
          mkdir -p test-reports
          tests/bats-core/bin/bats \
            --formatter tap \
            --report-formatter junit \
            -o test-reports/ \
            tests/*.bats tests/lib/*.bats

      - name: Upload bats JUnit results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: bats-junit-results
          path: test-reports/*.xml

      - name: Publish bats test results
        if: always()
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7  # v1
        with:
          name: Bats Tests
          path: test-reports/*.xml
          reporter: java-junit
          fail-on-error: false
