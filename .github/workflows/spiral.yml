name: SPIRAL

# SECURITY: pull_request_target with untrusted code checkout is FORBIDDEN.
# Never use pull_request_target alongside a checkout of the PR branch, as it
# grants write permissions to untrusted code. See:
# https://securitylab.github.com/research/github-actions-preventing-pwn-requests/

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Maximum number of SPIRAL iterations to run"
        type: string
        default: "5"
      gate:
        description: "Auto-answer gate prompts"
        type: choice
        options:
          - proceed
          - skip
          - quit
        default: proceed
      dry_run:
        description: "Dry run: test control flow without making API calls"
        type: boolean
        default: false

# Deny all permissions by default; each job grants only what it needs.
permissions: read-all

jobs:
  spiral:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        # TODO: Change egress-policy to block after completing an audit period
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run SPIRAL
        run: |
          GATE="${{ inputs.gate }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            GATE="skip"
            bash spiral.sh "${{ inputs.max_iterations }}" --gate "$GATE" --dry-run
          else
            bash spiral.sh "${{ inputs.max_iterations }}" --gate "$GATE"
          fi

      - name: Upload SPIRAL artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: spiral-outputs-${{ github.run_id }}
          retention-days: 7
          path: |
            prd.json
            .spiral/_research_output.json
            results.tsv
            .spiral/spiral_events.jsonl
